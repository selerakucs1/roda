<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Spin Pilihan</title>
<style>
  body {
    font-family: Arial, sans-serif;
    text-align: center;
    background: #f0f4f8;
  }

  h2 {
    margin-top: 20px;
  }

  .wheel-container {
    position: relative;
    width: 300px;
    margin: 40px auto;
  }

  .pointer {
    position: absolute;
    top: -10px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 30px;
    color: red;
  }

  .wheel {
    width: 300px;
    height: 300px;
    border-radius: 50%;
    border: 8px solid #333;
    position: relative;
    overflow: hidden;
    transition: transform 4s ease-out;
  }

  .segment {
    position: absolute;
    width: 50%;
    height: 50%;
    background: #ddd;
    transform-origin: 100% 100%;
    text-align: center;
    line-height: 150px;
    font-size: 12px;
    font-weight: bold;
  }

  button {
    padding: 10px 20px;
    font-size: 16px;
    cursor: pointer;
  }

  #result {
    margin-top: 20px;
    font-size: 18px;
    font-weight: bold;
  }
</style>
</head>
<body>

<h2>🎡 Spin Pilihan</h2>

<div class="wheel-container">
  <div class="pointer">▼</div>
  <div class="wheel" id="wheel"></div>
</div>

<button onclick="spin()">SPIN</button>

<div id="result"></div>

<script>
const options = [
  "Dirumah saja",
  "Ke pantai",
  "Ke mall",
  "Ke puncak",
  "Sewa vila",
  "Makan di restoran"
];

const wheel = document.getElementById("wheel");

// buat segment
const angle = 360 / options.length;

options.forEach((opt, i) => {
  const seg = document.createElement("div");
  seg.className = "segment";
  seg.style.transform = `rotate(${i * angle}deg) skewY(${90 - angle}deg)`;
  seg.style.background = i % 2 ? "#4ade80" : "#60a5fa";
  seg.innerHTML = `<div style="transform: skewY(-${90 - angle}deg) rotate(${angle/2}deg)">
    ${opt}
  </div>`;
  wheel.appendChild(seg);
});

let currentRotation = 0;

function spin() {
  // target index = 0 (Dirumah saja)
  const targetIndex = 0;

  // hitung posisi agar berhenti di pointer
  const stopAngle = 360 - (targetIndex * angle) - (angle / 2);

  // tambahkan putaran biar dramatis
  const extraSpin = 360 * 5;

  currentRotation += extraSpin + stopAngle;

  wheel.style.transform = `rotate(${currentRotation}deg)`;

  setTimeout(() => {
    document.getElementById("result").innerText =
      "Hasil: Dirumah saja 🏠";
  }, 4000);
}
</script>

</body>
</html>
