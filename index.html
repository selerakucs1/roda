<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Spin Pilihan</title>
<style>
  body {
    font-family: Arial, sans-serif;
    text-align: center;
    background: #eef2f7;
  }

  h2 {
    margin-top: 20px;
  }

  .container {
    position: relative;
    width: 320px;
    margin: 40px auto;
  }

  /* JARUM */
  .pointer {
    position: absolute;
    top: -18px;
    left: 50%;
    transform: translateX(-50%);
    width: 0;
    height: 0;
    border-left: 12px solid transparent;
    border-right: 12px solid transparent;
    border-bottom: 22px solid red;
    z-index: 10;
  }

  /* RODA */
  .wheel {
    width: 320px;
    height: 320px;
    border-radius: 50%;
    border: 8px solid #333;
    position: relative;
    transition: transform 4s cubic-bezier(0.2, 0.8, 0.2, 1);
    background: conic-gradient(
      #60a5fa 0deg 60deg,
      #4ade80 60deg 120deg,
      #facc15 120deg 180deg,
      #f87171 180deg 240deg,
      #a78bfa 240deg 300deg,
      #34d399 300deg 360deg
    );
  }

  /* TEXT */
  .label {
    position: absolute;
    left: 50%;
    top: 50%;
    transform-origin: 0 0;
    font-size: 13px;
    font-weight: bold;
    width: 120px;
    text-align: left;
  }

  button {
    padding: 10px 20px;
    font-size: 16px;
    cursor: pointer;
    margin-top: 20px;
  }

  #result {
    margin-top: 20px;
    font-weight: bold;
    font-size: 18px;
  }
</style>
</head>
<body>

<h2>🎡 Spin Pilihan</h2>

<div class="container">
  <div class="pointer"></div>
  <div class="wheel" id="wheel"></div>
</div>

<button onclick="spin()">SPIN</button>
<div id="result"></div>

<script>
const options = [
  "Dirumah saja",
  "Ke pantai",
  "Ke mall",
  "Ke puncak",
  "Sewa vila",
  "Makan di restoran"
];

const wheel = document.getElementById("wheel");
const angle = 360 / options.length;

// buat label teks
options.forEach((text, i) => {
  const div = document.createElement("div");
  div.className = "label";

  const rotate = i * angle + angle / 2;

  div.style.transform = `
    rotate(${rotate}deg)
    translate(20px, -10px)
  `;

  div.innerText = text;
  wheel.appendChild(div);
});

let rotation = 0;

function spin() {
  const targetIndex = 0; // selalu "Dirumah saja"

  const stopAngle = 360 - (targetIndex * angle) - (angle / 2);

  const extra = 360 * 5;

  rotation += extra + stopAngle;

  wheel.style.transform = `rotate(${rotation}deg)`;

  setTimeout(() => {
    document.getElementById("result").innerText =
      "Hasil: Dirumah saja 🏠";
  }, 4000);
}
</script>

</body>
</html>
