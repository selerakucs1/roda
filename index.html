<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Spin Fix Presisi</title>
<style>
  body {
    font-family: Arial;
    text-align: center;
    background: #eef2f7;
  }

  .container {
    position: relative;
    width: 320px;
    margin: 40px auto;
  }

  /* POINTER MERAH */
  .pointer {
    position: absolute;
    top: -18px;
    left: 50%;
    transform: translateX(-50%);
    width: 0;
    height: 0;
    border-left: 14px solid transparent;
    border-right: 14px solid transparent;
    border-bottom: 24px solid red;
    z-index: 10;
  }

  /* RODA */
  .wheel {
    width: 320px;
    height: 320px;
    border-radius: 50%;
    border: 8px solid #333;
    position: relative;
    transition: transform 4s ease-out;
    background: conic-gradient(
      #60a5fa 0deg 60deg,
      #4ade80 60deg 120deg,
      #facc15 120deg 180deg,
      #f87171 180deg 240deg,
      #a78bfa 240deg 300deg,
      #34d399 300deg 360deg
    );
  }

  .label {
    position: absolute;
    left: 50%;
    top: 50%;
    transform-origin: 0 0;
    font-size: 13px;
    font-weight: bold;
    width: 120px;
  }

  button {
    margin-top: 20px;
    padding: 10px 20px;
    font-size: 16px;
  }
</style>
</head>
<body>

<h2>🎡 Spin Anti Meleset</h2>

<div class="container">
  <div class="pointer"></div>
  <div class="wheel" id="wheel"></div>
</div>

<button onclick="spin()">SPIN</button>
<div id="result"></div>

<script>
const options = [
  "Dirumah saja",
  "Ke pantai",
  "Ke mall",
  "Ke puncak",
  "Sewa vila",
  "Makan di restoran"
];

const wheel = document.getElementById("wheel");
const angle = 360 / options.length;

// label
options.forEach((text, i) => {
  const div = document.createElement("div");
  div.className = "label";

  const midAngle = i * angle + angle / 2;

  div.style.transform = `
    rotate(${midAngle}deg)
    translate(30px, -10px)
  `;

  div.innerText = text;
  wheel.appendChild(div);
});

let currentRotation = 0;

function spin() {
  const targetIndex = 0; // "Dirumah saja"

  // posisi tengah segmen target
  const targetAngle = targetIndex * angle + angle / 2;

  // pointer di atas = 0deg, jadi kita putar kebalikan
  const stopAt = 360 - targetAngle;

  // tambahin putaran biar dramatis
  const spins = 5 * 360;

  currentRotation += spins + stopAt;

  wheel.style.transform = `rotate(${currentRotation}deg)`;

  setTimeout(() => {
    document.getElementById("result").innerText =
      "Hasil: Dirumah saja 🏠";
  }, 4000);
}
</script>

</body>
</html>
